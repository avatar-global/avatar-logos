<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>¡Feliz cumpleaños!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    body { margin:0; padding:0; width:100% !important; background:#eef3fb; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table { border-collapse:collapse; mso-table-lspace:0pt; mso-table-rspace:0pt; }
    img { border:0; outline:none; text-decoration:none; -ms-interpolation-mode:bicubic; display:block; }
    .serif { font-family:'Playfair Display', Georgia, 'Times New Roman', serif; }
    .sans  { font-family: Helvetica, Arial, sans-serif; }
    .name  { font-size:64px; line-height:1; font-weight:800; color:#15357a; letter-spacing:-1px; }
    .body  { font-size:16px; line-height:26px; color:#2b4a86; }

    @media only screen and (max-width:620px){
      .container { width:100% !important; }
      .name { font-size:11.5vw !important; }
      .name-cell { height:16vw !important; }
      .body { font-size:4.1vw !important; line-height:6.4vw !important; }
    }
  </style>
</head>
<body>
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:#eef3fb;font-size:1px;line-height:1px;">¡Feliz cumpleaños! De parte de toda la familia de Avatar Global.</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#eef3fb;">
    <tr>
      <td align="center" style="padding:24px 12px;">

        <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:600px;background:#f4f5f8;overflow:hidden;box-shadow:0 16px 40px rgba(27,58,122,0.12);line-height:0;">

          <!-- FRANJA 1: header (imagen) -->
          <tr><td style="font-size:0;line-height:0;">
            <img src="cid:fr1" width="600" alt="Avatar Global — Hoy celebramos a" style="width:100%;height:auto;display:block;" />
          </td></tr>

          <!-- FRANJA 2: nombre (texto dinámico sobre celda) -->
          <tr><td class="name-cell" align="center" valign="middle" height="94" style="background:#f4f5f8;height:94px;padding:0 16px;">
            <div style="font-family:'Playfair Display', Georgia, 'Times New Roman', serif; font-size:64px; line-height:1; font-weight:800; color:#15357a; letter-spacing:-1px;">{{nombre}}</div>
          </td></tr>

          <!-- FRANJA 3: ¡Feliz cumpleaños! (imagen) -->
          <tr><td style="font-size:0;line-height:0;">
            <img src="cid:fr3" width="600" alt="¡Feliz cumpleaños!" style="width:100%;height:auto;display:block;" />
          </td></tr>

          <!-- FRANJA 4: saludo (texto sobre celda) -->
          <tr><td class="body-cell" align="center" valign="top" style="background:#f4f5f8;padding:20px 48px 24px 48px;">
            <div style="font-family:Helvetica, Arial, sans-serif; font-size:16px; line-height:26px; color:#2b4a86;">Desde toda la familia de <strong style="color:#15357a;">Avatar Global</strong> te deseamos un día tan especial como lo eres tú. Gracias por tu energía, tu compromiso y por hacer crecer cada proyecto que tocamos.</div>
          </td></tr>

          <!-- FRANJA 5: footer con firma + cupcake + logo (imagen) -->
          <tr><td style="font-size:0;line-height:0;">
            <img src="cid:fr5" width="600" alt="Con cariño, todo el equipo de Avatar Global — Your e-commerce partner" style="width:100%;height:auto;display:block;" />
          </td></tr>

        </table>

      </td>
    </tr>
  </table>
</body>
</html>
